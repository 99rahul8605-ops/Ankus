services:
  - type: web
    name: stubot
    env: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: OWNER_ID
        sync: false
      - key: WEB_URL
        sync: false
      - key: STORAGE_CHANNEL_ID
        sync: false
      - key: FORCE_JOIN_CHANNELS
        sync: false
      - key: FORCE_JOIN_CHANNEL_NAMES
        sync: false
      - key: FORCE_JOIN_CHANNEL_LINKS
        sync: false
      - key: PREMIUM_REFERRAL_COUNT
        value: "5"
      - key: PREMIUM_DAYS
        value: "7"
      - key: DAILY_VIDEO_LIMIT
        value: "10"
