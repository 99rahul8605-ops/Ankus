services:
  - type: web
    name: stubot
    env: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_URI
        sync: false
      # NOT listed here on purpose: WEB_URL. On Render, the app now falls back
      # automatically to Render's own auto-injected RENDER_EXTERNAL_URL if you
      # don't set WEB_URL yourself — nothing to configure. Only add a manual
      # WEB_URL var here if you ever need to override that (e.g. a custom domain).
      - key: OWNER_ID
        sync: false
      - key: STORAGE_CHANNEL_ID
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: CONTACT_LINK
        sync: false
      # Gates the whole WebApp behind a "join these channels first" screen.
      # Leave BLANK unless you want the entire mini-app locked behind Force Join.
      - key: FORCE_JOIN_CHANNELS
        sync: false
      # Optional display names/links for the channels above (comma-separated,
      # same order) — used only for nicer button labels on the Force Join screen.
      - key: FORCE_JOIN_CHANNEL_NAMES
        sync: false
      - key: FORCE_JOIN_CHANNEL_LINKS
        sync: false
      # Separate on purpose from FORCE_JOIN_CHANNELS above — this is what the
      # per-batch Referral Unlock System uses to decide whether a referred user
      # needs to join before their referral counts toward a batch's unlock.
      - key: REFERRAL_FORCE_JOIN_CHANNELS
        sync: false
