services:
  - type: web
    name: stubot
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: OWNER_ID
        sync: false
      - key: FORCE_JOIN_CHANNELS
        sync: false
      - key: STORAGE_CHANNEL_ID
        sync: false
      - key: PREMIUM_REFERRAL_COUNT
        value: "5"
      - key: PREMIUM_DAYS
        value: "7"
      - key: WEB_URL
        fromService:
          type: web
          name: stubot
          property: host
